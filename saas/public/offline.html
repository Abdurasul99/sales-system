<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales System — Нет соединения</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 72px; height: 72px;
      background: #f3e8ff;
      border-radius: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #111; }
    p { font-size: 0.9rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    .badge {
      display: inline-block;
      background: #f3e8ff;
      color: #7c3aed;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <div class="badge">Offline режим</div>
    <h1>Нет подключения к сети</h1>
    <p>
      Проверьте интернет-соединение и повторите попытку.
      Ранее открытые страницы доступны в кэше.
    </p>
    <button onclick="location.reload()">Повторить попытку</button>
  </div>
</body>
</html>
